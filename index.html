<body> 
<header>
    <h1>Áreas Clicáveis</h1>
    <h2>Sol e Torre do Relógio</h2>

    <main>
            <!-- imagem utilizada -->
            <img src="imagens/mapeamento_imagem_nanoBanan.png" usemap="#mapa" alt="Paisagem Steampunk">

        <map name="mapa">
            <!-- Área do Sol -->
            <area shape="rect" coords="60,20,180,130" href="#" alt="Sol" id="ariaDoSol">
            <!-- Área da Torre -->
            <area shape="circle" coords="280,95,30" href="#" alt="Torre do Relógio" id="AriaDoRelogio">
    </map>
        </main>
            <article id="Escondido" class="escondido">
